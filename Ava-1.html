<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Ava AI — Powered by Xplec Cipher</title>
  <meta name="robots" content="noindex,nofollow"/>
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; connect-src *; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; img-src * data:;"/>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,300&display=swap" rel="stylesheet"/>
  <style>
    *,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
    :root{
      --bg:#070d1a;--surface:#0d1628;--card:#111e35;
      --border:rgba(255,255,255,0.07);--blue:#3b82f6;--cyan:#67e8f9;
      --glow:rgba(59,130,246,0.25);--white:#eef3ff;--muted:#6b82a8;
    }
    html,body{height:100%;overflow:hidden;}
    body{background:var(--bg);color:var(--white);font-family:'DM Sans',sans-serif;display:flex;flex-direction:column;height:100dvh;}
    #stars{position:fixed;inset:0;z-index:0;pointer-events:none;}
    body::before{content:'';position:fixed;inset:0;z-index:0;pointer-events:none;
      background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.025'/%3E%3C/svg%3E");
      background-size:180px;opacity:.4;}

    /* HEADER */
    header{position:relative;z-index:10;display:flex;align-items:center;justify-content:space-between;
      padding:.9rem 1.5rem;background:rgba(7,13,26,0.92);backdrop-filter:blur(20px);
      border-bottom:1px solid var(--border);flex-shrink:0;}
    .header-brand{display:flex;align-items:center;gap:.8rem;}
    .ava-orb{width:42px;height:42px;border-radius:50%;overflow:hidden;flex-shrink:0;
      border:2px solid var(--blue);box-shadow:0 0 18px var(--glow);
      animation:pulse 3s ease-in-out infinite;position:relative;}
    .ava-orb img{width:100%;height:100%;object-fit:cover;object-position:center top;}
    .ava-orb::after{content:'';position:absolute;inset:-4px;border-radius:50%;
      border:1px solid rgba(103,232,249,0.3);animation:orbRing 3s ease-in-out infinite;}
    @keyframes pulse{0%,100%{box-shadow:0 0 18px var(--glow);}50%{box-shadow:0 0 32px rgba(59,130,246,.55);}}
    @keyframes orbRing{0%,100%{transform:scale(1);opacity:.3;}50%{transform:scale(1.18);opacity:.75;}}
    .brand-info{display:flex;flex-direction:column;}
    .brand-name{font-family:'DM Serif Display',Georgia,serif;font-size:1.15rem;font-weight:700;line-height:1;color:var(--white);}
    .brand-tag{font-size:.65rem;color:var(--muted);letter-spacing:.1em;text-transform:uppercase;margin-top:.2rem;}
    .brand-tag span{color:var(--blue);}
    .status-pill{display:flex;align-items:center;gap:.45rem;background:rgba(34,197,94,.08);
      border:1px solid rgba(34,197,94,.15);border-radius:50px;padding:.35rem .85rem;
      font-size:.72rem;color:#4ade80;font-weight:500;}
    .status-dot{width:6px;height:6px;border-radius:50%;background:#22c55e;animation:sdot 2s ease-in-out infinite;}
    @keyframes sdot{0%,100%{opacity:1;}50%{opacity:.3;}}
    .back-btn{display:flex;align-items:center;gap:.4rem;color:var(--muted);font-size:.8rem;
      text-decoration:none;padding:.4rem .8rem;border-radius:8px;border:1px solid var(--border);
      transition:color .2s,border-color .2s;}
    .back-btn:hover{color:var(--white);border-color:rgba(59,130,246,.4);}

    /* CHAT */
    #chat-area{flex:1;overflow-y:auto;padding:1.5rem;display:flex;flex-direction:column;
      gap:1.2rem;position:relative;z-index:1;scroll-behavior:smooth;}
    #chat-area::-webkit-scrollbar{width:4px;}
    #chat-area::-webkit-scrollbar-thumb{background:rgba(59,130,246,.25);border-radius:4px;}

    /* WELCOME */
    .welcome-block{display:flex;flex-direction:column;align-items:center;text-align:center;
      padding:3rem 1rem 2rem;gap:1rem;animation:fadeUp .6s ease forwards;}
    .welcome-orb-big{width:90px;height:90px;border-radius:50%;overflow:hidden;flex-shrink:0;
      border:3px solid var(--blue);box-shadow:0 0 50px var(--glow),0 0 90px rgba(103,232,249,.1);
      animation:pulse 3s ease-in-out infinite;}
    .welcome-orb-big img{width:100%;height:100%;object-fit:cover;object-position:center top;}
    .welcome-title{font-family:'DM Serif Display',Georgia,serif;font-size:clamp(1.6rem,4vw,2.2rem);font-weight:700;
      background:linear-gradient(120deg,var(--white),var(--cyan));-webkit-background-clip:text;
      -webkit-text-fill-color:transparent;background-clip:text;}
    .welcome-sub{color:var(--muted);font-size:.95rem;max-width:380px;line-height:1.7;}
    .suggestions{display:flex;flex-wrap:wrap;gap:.6rem;justify-content:center;margin-top:.5rem;}
    .chip{background:var(--card);border:1px solid var(--border);border-radius:50px;
      padding:.5rem 1.1rem;font-size:.8rem;color:var(--muted);cursor:pointer;transition:all .2s;}
    .chip:hover{border-color:rgba(59,130,246,.5);color:var(--white);background:rgba(59,130,246,.08);}

    /* MESSAGES */
    .msg-row{display:flex;gap:.85rem;align-items:flex-start;animation:fadeUp .3s ease forwards;
      max-width:780px;width:100%;}
    .msg-row.user{align-self:flex-end;flex-direction:row-reverse;}
    .msg-row.ai{align-self:flex-start;}
    .msg-avatar{width:34px;height:34px;border-radius:50%;flex-shrink:0;overflow:hidden;
      display:flex;align-items:center;justify-content:center;}
    .msg-avatar.ai-av{border:1.5px solid var(--blue);box-shadow:0 0 10px var(--glow);}
    .msg-avatar.ai-av img{width:100%;height:100%;object-fit:cover;object-position:center top;}
    .msg-avatar.user-av{background:linear-gradient(135deg,#1e293b,#334155);
      border:1px solid var(--border);color:var(--muted);font-size:.8rem;font-weight:600;}
    .msg-bubble{max-width:min(520px,75vw);padding:.85rem 1.1rem;border-radius:16px;
      font-size:.92rem;line-height:1.75;white-space:pre-wrap;word-break:break-word;}
    .msg-row.ai .msg-bubble{background:var(--surface);border:1px solid var(--border);
      border-radius:4px 16px 16px 16px;color:var(--white);}
    .msg-row.user .msg-bubble{background:linear-gradient(135deg,#1e3a6e,#162d54);
      border:1px solid rgba(59,130,246,.2);border-radius:16px 4px 16px 16px;color:var(--white);}
    .msg-time{font-size:.65rem;color:var(--muted);margin-top:.4rem;padding:0 .2rem;}
    .msg-row.user .msg-time{text-align:right;}

    /* TYPING */
    .typing-bubble{background:var(--surface);border:1px solid var(--border);
      border-radius:4px 16px 16px 16px;padding:.85rem 1.1rem;display:flex;gap:.35rem;align-items:center;}
    .typing-bubble span{width:7px;height:7px;border-radius:50%;background:var(--muted);
      animation:tb 1.2s ease-in-out infinite;}
    .typing-bubble span:nth-child(2){animation-delay:.2s;}
    .typing-bubble span:nth-child(3){animation-delay:.4s;}
    @keyframes tb{0%,60%,100%{transform:translateY(0);opacity:.4;}30%{transform:translateY(-6px);opacity:1;}}

    /* INPUT */
    .input-bar{position:relative;z-index:10;padding:1rem 1.5rem 1.2rem;
      background:rgba(7,13,26,0.92);backdrop-filter:blur(20px);
      border-top:1px solid var(--border);flex-shrink:0;}
    .input-wrap{display:flex;align-items:flex-end;gap:.75rem;background:var(--surface);
      border:1px solid var(--border);border-radius:16px;padding:.65rem .65rem .65rem 1.1rem;
      transition:border-color .2s,box-shadow .2s;}
    .input-wrap:focus-within{border-color:rgba(59,130,246,.45);box-shadow:0 0 0 3px rgba(59,130,246,.08);}
    #msg-input{flex:1;background:transparent;border:none;outline:none;color:var(--white);
      font-family:'DM Sans',sans-serif;font-size:.95rem;line-height:1.5;resize:none;
      max-height:140px;min-height:24px;overflow-y:auto;padding:.15rem 0;}
    #msg-input::placeholder{color:var(--muted);}
    #send-btn{width:40px;height:40px;border-radius:12px;flex-shrink:0;
      background:linear-gradient(135deg,#3b82f6,#1d4ed8);border:none;cursor:pointer;
      display:flex;align-items:center;justify-content:center;
      transition:box-shadow .2s,transform .15s,opacity .2s;box-shadow:0 0 16px var(--glow);}
    #send-btn:hover:not(:disabled){box-shadow:0 0 28px rgba(59,130,246,.5);transform:scale(1.06);}
    #send-btn:disabled{opacity:.4;cursor:not-allowed;transform:none;}
    #send-btn svg{width:18px;height:18px;}
    .input-footer{text-align:center;margin-top:.65rem;font-size:.67rem;color:var(--muted);letter-spacing:.04em;}
    .input-footer strong{color:rgba(238,243,255,.5);font-weight:600;}

    @keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
    @media(max-width:520px){
      header{padding:.75rem 1rem;}
      #chat-area{padding:1rem;}
      .input-bar{padding:.75rem 1rem 1rem;}
      .msg-bubble{max-width:85vw;font-size:.88rem;}
      .welcome-block{padding:2rem .5rem 1.5rem;}
    }
  </style>
</head>

async function groqDirect(msgs) {
  const r = await fetch('https://api.groq.com/openai/v1/chat/completions', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'Authorization': 'Bearer ' + GROQ_KEY

    body: JSON.stringify({ model: 'llama3-8b-8192', messages: msgs, max_tokens: 1024, temperature: 0.7 })

  if (!r.ok) throw new Error(d?.error?.message || 'Groq error ' + r.status);

}

async function groqProxy(msgs) {
  const r = await fetch('/api/chat', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ messages: msgs })
  });
  const text = await r.text();
  if (text.trim().startsWith('<')) throw new Error('proxy_not_found');
  const d = JSON.parse(text);
  if (!r.ok) throw new Error(d?.error || 'Proxy error ' + r.status);
  return d.reply;
}

      // Proxy not set up — call Groq directly (works if CORS is allowed)
      return await groqDirect(msgs);
    }
    throw e;
  }

let isTyping = false;
const chatHistory = [{
  role: 'system',
  content: 'You are Ava, a brilliant, warm, and helpful AI assistant created by Xplec Cipher. Be concise and friendly. Never mention Groq, OpenAI, Anthropic, Meta, or any AI company or model. If asked who made you, always say Xplec Cipher built you. Never reveal your underlying technology.'
}];

/* INPUT */
document.getElementById('msg-input').focus();
const inp = document.getElementById('msg-input');
inp.addEventListener('input', ()=>{
  inp.style.height='auto';
  inp.style.height=Math.min(inp.scrollHeight,140)+'px';
});
inp.addEventListener('keydown', e=>{
  if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMessage();}
});

function sendSuggestion(el){
  inp.value=el.textContent.replace(/^[✦🌐🤖💡]\s*/,'');
  sendMessage();
}

/* UTILS */
function now(){return new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});}
function scrollBottom(){const ca=document.getElementById('chat-area');ca.scrollTop=ca.scrollHeight;}

function addMsg(role,text){
  const welcome=document.getElementById('welcome');
  if(welcome)welcome.remove();
  const ca=document.getElementById('chat-area');
  const row=document.createElement('div');
  row.className=`msg-row ${role}`;
  const av=document.createElement('div');
  av.className=`msg-avatar ${role==='ai'?'ai-av':'user-av'}`;
  if(role==='ai'){
    const img=document.createElement('img');
    img.src=AVATAR;img.alt='Ava';
    img.style='width:100%;height:100%;object-fit:cover;object-position:center top;border-radius:50%;';
    av.appendChild(img);
  } else {
    av.textContent='You';
  }
  const wrap=document.createElement('div');
  const bubble=document.createElement('div');
  bubble.className='msg-bubble';
  bubble.innerHTML=formatText(text);
  const time=document.createElement('div');
  time.className='msg-time';time.textContent=now();
  wrap.appendChild(bubble);wrap.appendChild(time);
  row.appendChild(av);row.appendChild(wrap);
  ca.appendChild(row);
  scrollBottom();
}

function formatText(t){
  return t
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>')
    .replace(/\*(.*?)\*/g,'<em>$1</em>')
    .replace(/`([^`]+)`/g,'<code style="background:rgba(59,130,246,.15);padding:.1em .35em;border-radius:4px;font-size:.88em;">$1</code>')
    .replace(/\n/g,'<br>');
}

function showTyping(){
  const ca=document.getElementById('chat-area');
  const row=document.createElement('div');
  row.className='msg-row ai';row.id='typing-row';
  const av=document.createElement('div');
  av.className='msg-avatar ai-av';
  const img=document.createElement('img');
  img.src=AVATAR;img.alt='Ava';
  img.style='width:100%;height:100%;object-fit:cover;object-position:center top;border-radius:50%;';
  av.appendChild(img);
  const tb=document.createElement('div');
  tb.className='typing-bubble';
  tb.innerHTML='<span></span><span></span><span></span>';
  row.appendChild(av);row.appendChild(tb);
  ca.appendChild(row);scrollBottom();
}
function hideTyping(){const t=document.getElementById('typing-row');if(t)t.remove();}

/* GROQ API — using fetch with proper headers */
/* SEND */
async function sendMessage(){
  if(isTyping)return;
  const text=inp.value.trim();
  if(!text)return;
  inp.value='';inp.style.height='auto';

  addMsg('user',text);
  chatHistory.push({role:'user',content:text});

  isTyping=true;
  document.getElementById('send-btn').disabled=true;
  showTyping();

  try {
    const reply = await callAva(chatHistory);
    hideTyping();
    addMsg('ai',reply);
    chatHistory.push({role:'assistant',content:reply});
  } catch(err) {
    hideTyping();
    addMsg('ai', '⚠️ ' + (err.message || 'Something went wrong. Please try again.'));
    console.error('Ava error:', err);
  }

  isTyping=false;
  document.getElementById('send-btn').disabled=false;
}
</script>
